name: Build and Push Docker Image

on:
  push:
    branches:
      - master # 当代码推送到 master 分支时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 授予操作权限，允许 Actions 将镜像写入你的仓库 Package 中
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 设置 Docker Buildx（用于加速构建和支持多平台）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. 登录到 GitHub 容器镜像仓库 (GHCR)
      # 这里使用的是 GitHub 自动生成的 Token，不需要额外配置 Secret
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. 构建并推送镜像
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 镜像标签格式：ghcr.io/用户名/仓库名:latest
          tags: |
            ghcr.io/${{ github.repository_owner }}/todo-api:latest
          # 开启缓存，下次构建会快很多
          cache-from: type=gha
          cache-to: type=gha,mode=max
