services:
  app:
    # 假设你的镜像名字叫 todo-app
    image: todo:latest
    build: .
    container_name: todo-container
    ports:
      - "8000:3000"
    volumes:
      # --- 关键修改：映射数据库文件 ---
      # 左边是宿主机目录 (确保这个文件存在，或者让 Docker 自动创建)
      # 右边是容器内定义的 dbCredentials.url 路径
      - ../data/sqlite.db:/app/sqlite.db
      # ------------------------------
      # 可选：映射日志和上传目录，保持数据持久化
      - ../data/logs:/app/logs
    environment:
      - NODE_ENV=production
      - ACCESS_SECRET="KFC-CRAZY-THURSDAY-VME50"
      - REFRESH_SECRET="KFC-CRAZY-THURSDAY-VME50"

    # -----------------------------
    restart: always
