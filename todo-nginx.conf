
server {
    listen 443 ssl http2;
    #http2 on; # 显式开启 HTTP/2 支持（新版本 Nginx 语法）
    # 如果你的 Nginx 版本较旧，使用 listen 443 ssl http2;
    server_name todo-api.rainbowgem.dpdns.org;

    ssl_certificate     ssl/rainbowgem.dpdns.org.pem;
    ssl_certificate_key ssl/rainbowgem.dpdns.org.key;

    location / {
        # 定义允许跨域的逻辑
        set $cors_origin "";
        if ($http_origin ~* (https://vite.rainbowgem.dpdns.org|https://todo.rainbowgem.dpdns.org|http://localhost:5175)) {
            set $cors_origin $http_origin;
        }

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,X-CSRF-token,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,X-CSRF-token,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # 代理设置
        proxy_pass http://0.0.0.0:8000; # 建议末尾不要加 /，除非你确定需要 path mapping
        #proxy_http_version 1.1; # 强制后端连接使用 HTTP/1.1，防止 505 传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
