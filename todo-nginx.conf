
server {
    listen 443 ssl;
    server_name todo-api.rainbowgem.dpdns.org;

    ssl_certificate     /etc/nginx/ssl/rainbowgem.dpdns.org.pem;
    ssl_certificate_key /etc/nginx/ssl/rainbowgem.dpdns.org.key;

    client_max_body_size 0;

    location / {
        # --- CORS設定の開始 ---
        
        # 1. 許可するOrigin (http://localhost:5175 からのアクセスを許可)
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5175' always;
        
        # 2. 【重要】認証情報(Cookieなど)を許可する設定
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        # 3. 許可するメソッド
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        
        # 4. 許可するヘッダー
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,X-CSRF-token,Authorization' always;
        
        # 5. フロントエンドがアクセス可能なレスポンスヘッダー
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # --- OPTIONS (プリフライト) リクエストの処理 ---
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:5175' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,X-CSRF-token,Authorization' always;
            
            # プリフライトのキャッシュ時間
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # --- プロキシ設定 ---
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}